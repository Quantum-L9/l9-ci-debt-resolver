schema: l9.resolver-delegation-privacy-policy/v1
metadata:
  phase: RESOLVER-P6
  enforcement: fail_closed
maximums:
  request_bytes: 65536
  proposal_bytes: 262144
  signatures: 25
  entity_ids: 100
  finding_ids: 100
  contract_ids: 100
  test_ids: 100
  operations: 50
  replacement_bytes_per_operation: 1048576
  total_replacement_bytes: 10485760
forbidden_keys:
  - raw_log
  - source_code
  - source_content
  - patch
  - diff
  - branch
  - commit_message
  - credential
  - token
  - authorization
  - password
  - secret
  - environment
  - developer
  - actor
  - email
  - absolute_path
  - repository_path
forbidden_values:
  - bearer_token
  - GitHub_token
  - AWS_access_key
  - private_key
  - email_address
  - IP_address
  - Unix_absolute_path
  - Windows_absolute_path
  - credential_bearing_URL
  - multiline_source_content
