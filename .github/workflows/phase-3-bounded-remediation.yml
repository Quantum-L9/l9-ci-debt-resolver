name: RESOLVER-P3 Bounded Remediation

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'
      - name: Validate schemas
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          from jsonschema import Draft202012Validator
          for path in sorted(Path("schemas/resolver").glob("*.json")):
              schema = json.loads(path.read_text(encoding="utf-8"))
              Draft202012Validator.check_schema(schema)
              print(path)
          PY
      - name: Phase tests
        run: pytest tests/remediation tests/validation tests/runtime
      - name: Full suite
        run: pytest --cov=l9_debt_resolver --cov-report=term-missing --cov-fail-under=85
      - name: Ruff
        run: ruff check .
      - name: Mypy
        run: mypy src
      - name: Capabilities
        run: l9-debt-resolver capabilities
